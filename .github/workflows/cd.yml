name: CD - Build & Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Get version from pom.xml
        id: get_version
        run: |
          VERSION=$(grep '<version>' pom.xml | head -1 | sed 's/.*<version>//;s/<\/version>.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.get_version.outputs.version }}-${{ github.run_number }}
          body: |
            ## Bản release tự động
            - Commit: ${{ github.sha }}
            - Build số: ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            target/*.jar
